spring.application.name=p2p-simulator
server.port=${SIMULATOR_PORT:8081}
server.address=${SIMULATOR_BIND:127.0.0.1}

spring.datasource.url=${P2P_DB_URL:jdbc:h2:file:./data/p2p-sim;AUTO_SERVER=TRUE}
spring.datasource.username=${P2P_DB_USER:sa}
spring.datasource.password=${P2P_DB_PASSWORD:}
spring.sql.init.mode=always
spring.sql.init.encoding=UTF-8
spring.jackson.deserialization.fail-on-unknown-properties=true
server.error.include-message=never

app.diagnostics.username=${P2P_DIAG_USER:DIAG_READER}
app.diagnostics.password=${P2P_DIAG_PASSWORD:diag-reader-local}
app.diagnostics.http-token=${SIMULATOR_DIAGNOSTIC_TOKEN:local-diagnostic-token}
app.cors.allowed-origins=${P2P_FRONTEND_ORIGINS:http://127.0.0.1:8080,http://localhost:8080}
