spring.application.name=p2p-intelligence-app
server.port=${INTELLIGENCE_PORT:8082}
server.error.include-message=never

app.cors.allowed-origins=${P2P_FRONTEND_ORIGINS:http://127.0.0.1:8080,http://localhost:8080}

app.simulator.base-url=${SIMULATOR_BASE_URL:http://127.0.0.1:8081}
app.simulator.token=${SIMULATOR_DIAGNOSTIC_TOKEN:local-diagnostic-token}
app.simulator.connect-timeout=${SIMULATOR_CONNECT_TIMEOUT:2s}
app.simulator.read-timeout=${SIMULATOR_READ_TIMEOUT:5s}

app.codex.executable=${CODEX_EXECUTABLE:codex}
app.codex.timeout=${CODEX_TIMEOUT:120s}
app.codex.preflight-timeout=${CODEX_PREFLIGHT_TIMEOUT:10s}
app.codex.workspace=${CODEX_WORKSPACE:${java.io.tmpdir}/p2p-codex-runtime}

app.warmup.model-enabled=${CODEX_MODEL_WARMUP:true}

management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never
